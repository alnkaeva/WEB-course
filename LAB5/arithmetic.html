<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Николаева Алёна. Лабораторная 5</title>
    <link rel="stylesheet" href="../main.css">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <script>
        function showSum() {
            let inputA = document.getElementById('numberA');
            let inputB = document.getElementById('numberB');
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a + b;
            alert('Сумма ' + a + ' и ' + b + ' равна ' + result);
        }
        function showAuthor() {
            let author = "Авторка страницы:\nНиколаева Алёна Андреевна";
            alert(author);
        }
        function showHello(){
            let hello = "Приветствую на своей странице!\nПравила моей странички:\n1.Я тут главная!!!\n2.Фанаты хеллюу китти сразу в друзья\n3.Куроми крутышка!\n4.антифем на выход\n5.если не согласен прочитай первое правило\n7.можете не писать я всеровно игнорю";
            alert(hello);
        }
        function showDif() {
            let inputA = document.getElementById('numberA');
            let inputB = document.getElementById('numberB');
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a - b;
            alert('Разность ' + a + ' и ' + b + ' равна ' + result);
        }
        function showMulti() {
            let inputA = document.getElementById('numberA');
            let inputB = document.getElementById('numberB');
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a * b;
            alert('Произведение ' + a + ' и ' + b + ' равно ' + result);
        }
        function showDiv() {
            let inputA = document.getElementById('numberA');
            let inputB = document.getElementById('numberB');
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a/b;

            if (b == 0) {
                alert("На ноль делить нельзя!");
                inputB.focus();
                inputB.select();
                inputB.style.Color = 'red';
                inputB.style.borderColor = 'red';
                return;
            }

            if (isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                inputA.focus();
                inputA.select();
                inputA.style.Color = 'red';
                inputA.style.borderColor = 'red';
                return;
            }

            if (isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                inputB.focus();
                inputB.select();
                inputB.style.Color = 'red';
                inputB.style.borderColor = 'red';
                return;
            }

            inputA.style.color = "";
            inputA.style.borderColor = "";

            inputB.style.color = "";
            inputB.style.borderColor = "";

            alert('Деление ' + a + ' на ' + b + ' равно ' + result);
        }
        function showExpon() {
            let inputA = document.getElementById('numberA');
            let inputB = document.getElementById('numberB');
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a**b;

            if (b == 0 && a == 0) {
                alert("Оба числа равны нулю");
                inputB.focus();
                inputB.select();
                inputB.style.Color = 'red';
                inputB.style.borderColor = 'red';
                inputA.style.Color = 'red';
                inputA.style.borderColor = 'red';
                return;
            }

            if (isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                inputA.focus();
                inputA.select();
                inputA.style.Color = 'red';
                inputA.style.borderColor = 'red';
                return;
            }

            if (isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                inputB.focus();
                inputB.select();
                inputB.style.Color = 'red';
                inputB.style.borderColor = 'red';
                return;
            }

            inputA.style.color = "";
            inputA.style.borderColor = "";

            inputB.style.color = "";
            inputB.style.borderColor = "";

            alert('Возведение ' + a + ' в степень ' + b + ' равно ' + result);
        }
        function changeOutput(buttonNum, backColor, textColor) {
            let output = document.getElementById('output')
            output.innerHTML = 'Нажата кнопка ' + buttonNum
            output.style.backgroundColor = backColor
            output.style.color = textColor
        }
    </script>
    <style>
        .message {
            display: inline-block;
            vertical-align: top;
            text-align: center;
            width: 200px;
            height: 50px;
            color: black;
            background-color: bisque;
            border: 2px solid darkred;
            border-radius: 10px;
            padding-top: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        header{
            cursor: pointer;
        }
        footer{
            cursor: pointer;
        }
        #output {
            border: 1px solid;
            width: 300px;
            height: 40px;
        }
        .buttons {
            display: inline-block;
            margin: 10px 10px 10px 0;
        }
    </style>
</head>
<body>
    <header onclick="showAuthor()">НГТУ, ФБ, Лабораторная работа 5</header>
    <main>
        <label>Первое число: <input type="number" value="5154" id="numberA"></label><br>
        <label>Второе число: <input type="number" value="7891" id="numberB"></label><br>
        <div class="message" onclick="showSum()">Найти сумму чисел</div>
        <div class="message" onmouseenter="showDif()">Найти разность чисел</div>
        <div class="message" oncontextmenu="showMulti()">Найти произведение чисел</div>
        <div class="message" onclick="showDiv()">Найти частное чисел</div>
        <div class="message" onclick="showExpon()">Найти возведение чисел</div>
        <div class="message" onclick="showAuthor()">Узнать, кто автор страницы</div>

        <div class="buttons">
            <input type="button" value="Кнопка 1" onclick="changeOutput(1, 'red', 'yellow')">
            <input type="button" value="Кнопка 2" onclick="changeOutput(2, 'lime', 'salmon')">
            <input type="button" value="Кнопка 3" onclick="changeOutput(3, 'azure', 'darkred')">
            <input type="button" value="Кнопка 4" onclick="changeOutput(4, 'brown', 'bisque')">
        </div>

        <div id="output"></div>
    </main>
    <footer ondblclick="showHello()">
        &copy; Алёна Николаева, ФБИ-41, 2 курс, 2026
    </footer>
</body>
</html>
